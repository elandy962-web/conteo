<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Conteo">
  <meta name="theme-color" content="#1e3a8a">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Conteo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #162032;
      --blue: #2563eb;
      --blue-light: #3b82f6;
      --green: #22c55e;
      --purple: #7c3aed;
      --red: #ef4444;
      --text: #f1f5f9;
      --muted: #64748b;
      --border: #1e3a5f;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    header h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: .06em; }
    header span { font-size: .75rem; opacity: .7; }

    #btn-install {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 12px 6px;
      text-align: center;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all .2s;
    }
    .tab.active {
      color: var(--blue-light);
      border-bottom-color: var(--blue-light);
    }

    /* ── Secciones ── */
    .section { display: none; padding: 16px; max-width: 480px; margin: 0 auto; }
    .section.active { display: block; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Inputs ── */
    label { font-size: .82rem; color: #94a3b8; display: block; margin-bottom: 4px; margin-top: 10px; }
    label:first-child { margin-top: 0; }

    input[type="text"], input[type="date"], input[type="number"] {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 11px 14px;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--blue-light); }

    .num-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .num-row input { flex: 1; }

    /* ── Botones ── */
    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 12px;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-blue   { background: var(--blue);   color: #fff; }
    .btn-green  { background: #16a34a;       color: #fff; }
    .btn-red    { background: var(--red);    color: #fff; }
    .btn-purple { background: var(--purple); color: #fff; }
    .btn-gray   { background: #334155;       color: #fff; }
    .btn-camera {
      width: 48px; height: 48px;
      padding: 0;
      border: none;
      border-radius: 10px;
      background: var(--blue);
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .btn-camera:hover { background: #1d4ed8; }

    /* ── Totales ── */
    .totals {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .total-box {
      background: var(--card);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .total-label { font-size: .68rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 4px; }
    .total-value { font-size: 2rem; font-weight: 800; color: var(--green); }
    .total-value.blue { color: var(--blue-light); }

    /* ── Lista de números ── */
    #num-list {
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
    }
    #num-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: .9rem;
      transition: background .15s;
    }
    #num-list li:nth-child(odd)  { background: rgba(30,58,95,.4); }
    #num-list li:nth-child(even) { background: rgba(15,23,42,.4); }
    #num-list li .del-btn {
      background: none;
      border: none;
      color: var(--red);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
      border-radius: 4px;
    }
    #num-list li .del-btn:hover { background: rgba(239,68,68,.15); }

    /* ── Historial ── */
    .hist-group {
      background: var(--card);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .hist-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      cursor: pointer;
      background: rgba(30,58,95,.5);
    }
    .hist-header .hist-name { font-weight: 700; font-size: .9rem; }
    .hist-header .hist-meta { font-size: .75rem; color: var(--muted); }
    .hist-header .hist-total { color: var(--green); font-weight: 700; }
    .hist-body { padding: 10px 14px; display: none; }
    .hist-body.open { display: block; }
    .hist-nums {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .hist-chip {
      background: var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: .82rem;
      color: #93c5fd;
    }
    .hist-del-btn {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 5px 12px;
      font-size: .78rem;
      cursor: pointer;
      font-weight: 600;
    }
    .hist-pdf-btn {
      background: #0e7490;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 5px 12px;
      font-size: .78rem;
      cursor: pointer;
      font-weight: 600;
    }
    .hist-btn-row { display: flex; gap: 8px; margin-top: 6px; }
    #btn-pdf-todo { background: #0e7490; color: #fff; }

    /* ── Modal Cámara ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }
    .modal-overlay.open { display: flex; }

    .cam-sheet {
      background: #0f1f38;
      border-radius: 20px 20px 0 0;
      padding: 16px 16px 30px;
      width: 100%;
      max-width: 480px;
    }

    .cam-handle {
      width: 40px; height: 4px;
      background: #334155;
      border-radius: 2px;
      margin: 0 auto 14px;
    }

    #video-wrap {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4/3;
      width: 100%;
    }
    #cam-video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .focus-frame {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 90%; height: 45%;
      border: 2px solid var(--blue-light);
      border-radius: 8px;
      pointer-events: none;
    }
    .corner { position: absolute; width: 14px; height: 14px; }
    .corner.tl { top: -2px; left: -2px;  border-top: 3px solid #60a5fa; border-left: 3px solid #60a5fa; border-radius: 4px 0 0 0; }
    .corner.tr { top: -2px; right: -2px; border-top: 3px solid #60a5fa; border-right: 3px solid #60a5fa; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: -2px; left: -2px;  border-bottom: 3px solid #60a5fa; border-left: 3px solid #60a5fa; border-radius: 0 0 0 4px; }
    .corner.br { bottom: -2px; right: -2px; border-bottom: 3px solid #60a5fa; border-right: 3px solid #60a5fa; border-radius: 0 0 4px 0; }
    #cam-hint { position: absolute; bottom: 8px; left: 0; right: 0; text-align: center; font-size: .72rem; color: rgba(255,255,255,.65); }

    .scan-line {
      position: absolute;
      left: 5%; right: 5%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #34d399, transparent);
      box-shadow: 0 0 8px #34d399;
      top: 27%;
      display: none;
      animation: scanMove 1.5s ease-in-out infinite;
    }
    @keyframes scanMove {
      0%   { top: 27%; opacity: 1; }
      50%  { top: 65%; opacity: 1; }
      100% { top: 27%; opacity: 1; }
    }
    .scan-line.active { display: block; }

    .success-flash {
      position: absolute;
      inset: 0;
      background: rgba(52, 211, 153, 0.25);
      border-radius: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
    }
    .success-flash.show { opacity: 1; }

    #cam-canvas { display: none; }

    .cam-mode-toggle {
      display: flex;
      background: #0a1628;
      border-radius: 10px;
      margin-top: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .cam-mode-btn {
      flex: 1; padding: 10px 6px;
      background: none; border: none;
      color: var(--muted); font-size: .8rem; font-weight: 700;
      cursor: pointer; transition: all .2s;
    }
    .cam-mode-btn.active { background: var(--blue); color: #fff; }

    .cam-controls { display: flex; gap: 10px; margin-top: 10px; }
    .cam-controls button {
      flex: 1; padding: 12px; border: none; border-radius: 10px;
      font-size: .88rem; font-weight: 700; cursor: pointer;
      transition: opacity .2s;
    }
    .cam-controls button:disabled { opacity: .4; }
    #cam-btn-read { background: var(--green); color: #fff; }
    #cam-btn-close { background: #334155; color: #fff; }

    .cam-result {
      background: #0a1628;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 12px;
      min-height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .cam-result-num {
      font-size: 2.2rem;
      font-weight: 800;
      color: #34d399;
      min-width: 80px;
    }
    .cam-result-info { flex: 1; }
    .cam-status { font-size: .8rem; color: #94a3b8; margin-bottom: 4px; }

    #progress-wrap { height: 4px; background: #1e3a5f; border-radius: 2px; margin-top: 6px; overflow: hidden; display: none; }
    #progress-fill { height: 100%; background: var(--blue-light); width: 0%; transition: width .3s; }

    #cam-btn-use {
      width: 100%; margin-top: 10px;
      background: var(--purple); color: #fff;
      padding: 12px; border: none; border-radius: 10px;
      font-size: .92rem; font-weight: 700; cursor: pointer;
      display: none;
    }

    #scan-counter {
      text-align: center; margin-top: 8px;
      font-size: .8rem; color: #34d399; font-weight: 700;
      display: none;
    }

    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .empty { color: var(--muted); font-size: .85rem; text-align: center; padding: 20px 0; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Conteo</h1>
    <span id="header-date"></span>
  </div>
  <button id="btn-install">⬇ Instalar</button>
</header>

<div class="tabs">
  <div class="tab active" data-tab="registrar">📝 Registrar</div>
  <div class="tab" data-tab="historial">📋 Historial</div>
</div>

<div class="section active" id="tab-registrar">
  <div class="totals">
    <div class="total-box">
      <div class="total-label">Total Acumulado</div>
      <div class="total-value" id="display-total">0</div>
    </div>
    <div class="total-box">
      <div class="total-label">Cantidad</div>
      <div class="total-value blue" id="display-count">0</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Nueva entrada</div>
    <label>Fecha de Lista</label>
    <input type="date" id="input-fecha">

    <label>Nombre de Lista</label>
    <input type="text" id="input-nombre" placeholder="Ej: Lista Mañana">

    <label>Número a agregar</label>
    <div class="num-row">
      <input type="number" id="input-numero" placeholder="0" min="0">
      <button class="btn-camera" id="btn-open-cam" title="Leer con cámara">📷</button>
    </div>
    <button class="btn btn-blue" id="btn-add">+ Añadir</button>
  </div>

  <div class="card">
    <div class="card-title">Números en la lista actual</div>
    <ul id="num-list"><li class="empty">Agrega números para comenzar.</li></ul>
    <button class="btn btn-green" id="btn-save" style="margin-top:12px">💾 Guardar esta Lista</button>
  </div>
</div>

<div class="section" id="tab-historial">
  <div class="card">
    <div class="card-title">Historial por Rango de Fechas</div>
    <div class="date-row">
      <div>
        <label>Desde</label>
        <input type="date" id="hist-desde">
      </div>
      <div>
        <label>Hasta</label>
        <input type="date" id="hist-hasta">
      </div>
    </div>
    <button class="btn btn-blue" id="btn-filtrar" style="margin-top:12px">🔍 Filtrar</button>
    <button class="btn btn-gray"  id="btn-ver-todo" style="margin-top:8px">Ver Todo</button>
    <button class="btn" id="btn-pdf-todo" style="margin-top:8px">📄 Exportar todo a PDF</button>
  </div>
  <div id="hist-container"><p class="empty">No hay listas guardadas aún.</p></div>
</div>

<div class="modal-overlay" id="cam-modal">
  <div class="cam-sheet">
    <div class="cam-handle"></div>
    <div id="video-wrap">
      <video id="cam-video" autoplay playsinline muted></video>
      <div class="focus-frame">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
      <div class="scan-line" id="scan-line"></div>
      <div class="success-flash" id="success-flash"></div>
      <div id="cam-hint">Centra el número en el recuadro azul</div>
    </div>
    <canvas id="cam-canvas"></canvas>

    <div class="cam-mode-toggle">
      <button class="cam-mode-btn active" id="mode-manual">📸 Manual</button>
      <button class="cam-mode-btn" id="mode-scanner">⚡ Escáner Auto</button>
    </div>

    <div class="cam-controls">
      <button id="cam-btn-read" disabled>📸 Leer Número</button>
      <button id="cam-btn-close">✕ Cerrar</button>
    </div>

    <div class="cam-result">
      <div class="cam-result-num" id="cam-detected">—</div>
      <div class="cam-result-info">
        <div class="cam-status" id="cam-status">Abriendo cámara…</div>
        <div id="progress-wrap"><div id="progress-fill"></div></div>
      </div>
    </div>
    <button id="cam-btn-use">✔ Usar este número</button>
    <div id="scan-counter"></div>
  </div>
</div>

<script>
let currentList  = [];          
let savedLists   = JSON.parse(localStorage.getItem('conteoVIP_listas') || '[]');
let camStream    = null;
let lastDetected = null;

const $ = id => document.getElementById(id);

function formatDate(d) {
  if (!d) return '—';
  const [y,m,dia] = d.split('-');
  return `${dia}/${m}/${y}`;
}

function today() {
  return new Date().toISOString().slice(0,10);
}

$('input-fecha').value = today();
$('header-date').textContent = formatDate(today());

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    $('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'historial') renderHistorial(savedLists);
  });
});

function updateTotals() {
  const total = currentList.reduce((a,b) => a + b, 0);
  $('display-total').textContent = total.toLocaleString('es');
  $('display-count').textContent = currentList.length;
}

function renderList() {
  const ul = $('num-list');
  if (!currentList.length) {
    ul.innerHTML = '<li class="empty">Agrega números para comenzar.</li>';
    return;
  }
  ul.innerHTML = currentList.map((n,i) => `
    <li>
      <span><strong>#${i+1}</strong> — ${n.toLocaleString('es')}</span>
      <button class="del-btn" data-i="${i}">🗑</button>
    </li>
  `).join('');
  ul.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentList.splice(+btn.dataset.i, 1);
      renderList();
      updateTotals();
    });
  });
}

$('btn-add').addEventListener('click', () => {
  const val = parseFloat($('input-numero').value);
  if (isNaN(val)) { alert('Ingresa un número válido.'); return; }
  currentList.push(val);
  $('input-numero').value = '';
  renderList();
  updateTotals();
});

$('input-numero').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('btn-add').click();
});

$('btn-save').addEventListener('click', () => {
  if (!currentList.length) { alert('No hay números para guardar.'); return; }
  const nombre = $('input-nombre').value.trim() || 'Lista sin nombre';
  const fecha  = $('input-fecha').value || today();
  savedLists.push({ id: Date.now(), fecha, nombre, numeros: [...currentList] });
  localStorage.setItem('conteoVIP_listas', JSON.stringify(savedLists));
  currentList = [];
  renderList();
  updateTotals();
  $('input-nombre').value = '';
  alert(`✅ Lista "${nombre}" guardada.`);
});

function renderHistorial(listas) {
  const cont = $('hist-container');
  if (!listas.length) {
    cont.innerHTML = '<p class="empty">No hay listas guardadas aún.</p>';
    return;
  }
  const sorted = [...listas].sort((a,b) => b.id - a.id);
  cont.innerHTML = sorted.map(l => {
    const total = l.numeros.reduce((a,b) => a+b, 0);
    return `
    <div class="hist-group">
      <div class="hist-header" data-id="${l.id}">
        <div>
          <div class="hist-name">${l.nombre}</div>
          <div class="hist-meta">${formatDate(l.fecha)} · ${l.numeros.length} números</div>
        </div>
        <div class="hist-total">${total.toLocaleString('es')}</div>
      </div>
      <div class="hist-body" id="hb-${l.id}">
        <div class="hist-nums">
          ${l.numeros.map(n => `<span class="hist-chip">${n.toLocaleString('es')}</span>`).join('')}
        </div>
        <div class="hist-btn-row">
          <button class="hist-pdf-btn" data-id="${l.id}">📄 PDF</button>
          <button class="hist-del-btn" data-id="${l.id}">🗑 Eliminar</button>
        </div>
      </div>
    </div>`;
  }).join('');

  cont.querySelectorAll('.hist-header').forEach(h => {
    h.addEventListener('click', () => {
      const body = $('hb-' + h.dataset.id);
      body.classList.toggle('open');
    });
  });

  cont.querySelectorAll('.hist-pdf-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const lista = savedLists.find(l => l.id == btn.dataset.id);
      if (lista) exportPDF([lista]);
    });
  });

  cont.querySelectorAll('.hist-del-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm('¿Eliminar esta lista?')) return;
      savedLists = savedLists.filter(l => l.id != btn.dataset.id);
      localStorage.setItem('conteoVIP_listas', JSON.stringify(savedLists));
      renderHistorial(savedLists);
    });
  });
}

$('btn-filtrar').addEventListener('click', () => {
  const desde = $('hist-desde').value;
  const hasta = $('hist-hasta').value;
  const filtradas = savedLists.filter(l => {
    if (desde && l.fecha < desde) return false;
    if (hasta && l.fecha > hasta) return false;
    return true;
  });
  renderHistorial(filtradas);
});

$('btn-ver-todo').addEventListener('click', () => {
  $('hist-desde').value = '';
  $('hist-hasta').value = '';
  renderHistorial(savedLists);
});

// ═══ CÁMARA OCR ═══
const camModal  = $('cam-modal');
const camVideo  = $('cam-video');
const camCanvas = $('cam-canvas');
const camCtx    = camCanvas.getContext('2d');

let scannerMode    = false;   
let scannerRunning = false;
let scannerCount   = 0;
let lastScannedNum = null;    
let cooldownActive = false;   

async function openCam() {
  camModal.classList.add('open');
  $('cam-detected').textContent = '—';
  $('cam-status').textContent = 'Iniciando cámara…';
  $('cam-btn-use').style.display = 'none';
  $('cam-btn-read').disabled = true;
  $('scan-counter').style.display = 'none';
  lastDetected = null;
  lastScannedNum = null;
  scannerCount = 0;
  setScannerMode(false); 

  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    camVideo.srcObject = camStream;
    camVideo.onloadedmetadata = () => {
      $('cam-btn-read').disabled = false;
      $('cam-status').textContent = 'Centra el número y presiona "Leer Número".';
    };
  } catch(e) {
    $('cam-status').textContent = '⚠ Sin acceso a cámara: ' + e.message;
  }
}

function closeCam() {
  stopScanner();
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  camVideo.srcObject = null;
  camModal.classList.remove('open');
}

async function captureAndOCR(showProgress) {
  const vw = camVideo.videoWidth  || 640;
  const vh = camVideo.videoHeight || 480;
  const cw = vw * 0.90, ch = vh * 0.45;
  const cx = (vw - cw) / 2, cy = (vh - ch) / 2;

  camCanvas.width  = cw;
  camCanvas.height = ch;
  camCtx.drawImage(camVideo, cx, cy, cw, ch, 0, 0, cw, ch);

  const imgD = camCtx.getImageData(0, 0, cw, ch);
  const d = imgD.data;
  for (let i = 0; i < d.length; i += 4) {
    const g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    const c = g > 128 ? Math.min(255, g*1.5) : Math.max(0, g*0.5);
    d[i] = d[i+1] = d[i+2] = c;
  }
  camCtx.putImageData(imgD, 0, 0);

  const result = await Tesseract.recognize(camCanvas, 'eng', {
    logger: m => {
      if (showProgress && m.status === 'recognizing text') {
        $('progress-fill').style.width = (m.progress*100).toFixed(0) + '%';
      }
    },
    tessedit_char_whitelist: '0123456789',
    tessedit_pageseg_mode: '7',
  });

  const raw  = result.data.text.replace(/\D/g, '').trim();
  const conf = result.data.confidence;
  return { raw, conf };
}

function flashSuccess() {
  const fl = $('success-flash');
  fl.classList.add('show');
  setTimeout(() => fl.classList.remove('show'), 300);
}

$('cam-btn-read').addEventListener('click', async () => {
  if (!camStream) return;
  $('cam-btn-read').disabled = true;
  $('cam-status').textContent = 'Analizando…';
  $('progress-wrap').style.display = 'block';
  $('progress-fill').style.width = '0%';
  $('cam-detected').textContent = '…';
  $('cam-btn-use').style.display = 'none';

  try {
    const { raw, conf } = await captureAndOCR(true);
    if (raw) {
      lastDetected = raw;
      $('cam-detected').textContent = raw;
      $('cam-status').textContent = `✅ Detectado con ${conf.toFixed(0)}% de confianza.`;
      $('cam-btn-use').style.display = 'block';
      flashSuccess();
    } else {
      $('cam-detected').textContent = '—';
      $('cam-status').textContent = '⚠ No se detectó número. Intenta de nuevo.';
    }
  } catch(e) {
    $('cam-status').textContent = '❌ Error: ' + e.message;
  }

  $('progress-wrap').style.display = 'none';
  $('cam-btn-read').disabled = false;
});

$('cam-btn-use').addEventListener('click', () => {
  if (!lastDetected) return;
  $('input-numero').value = lastDetected;
  $('cam-status').textContent = `Número ${lastDetected} listo en el campo ✔`;
  $('cam-btn-use').style.display = 'none';
  closeCam();
  $('input-numero').scrollIntoView({ behavior: 'smooth', block: 'center' });
  $('input-numero').focus();
});

function setScannerMode(enabled) {
  scannerMode = enabled;
  $('mode-manual').classList.toggle('active', !enabled);
  $('mode-scanner').classList.toggle('active', enabled);
  $('scan-line').classList.toggle('active', enabled);
  $('cam-hint').textContent = enabled
    ? '⚡ Escáner activo — apunta al número'
    : 'Centra el número en el recuadro azul';

  if (enabled) {
    $('cam-btn-read').style.display = 'none';
    $('cam-btn-use').style.display  = 'none';
    $('scan-counter').style.display = 'block';
    updateScanCounter();
    startScanner();
  } else {
    $('cam-btn-read').style.display = '';
    $('scan-counter').style.display = 'none';
    stopScanner();
  }
}

function updateScanCounter() {
  $('scan-counter').textContent = scannerCount > 0
    ? `✅ ${scannerCount} número${scannerCount > 1 ? 's' : ''} agregado${scannerCount > 1 ? 's' : ''} automáticamente`
    : 'Apunta al número para escanear…';
}

function startScanner() {
  if (scannerRunning) return;
  scannerRunning = true;
  runScanLoop();
}

function stopScanner() {
  scannerRunning = false;
}

async function runScanLoop() {
  while (scannerRunning && scannerMode) {
    if (!camStream || !camVideo.videoWidth || cooldownActive) {
      await sleep(300);
      continue;
    }

    try {
      const { raw, conf } = await captureAndOCR(false);

      if (raw && conf > 60) {
        if (raw !== lastScannedNum) {
          lastScannedNum = raw;
          lastDetected = raw;

          const val = parseFloat(raw);
          if (!isNaN(val)) {
            currentList.push(val);
            renderList();
            updateTotals();
            scannerCount++;
            updateScanCounter();
            flashSuccess();

            $('cam-detected').textContent = raw;
            $('cam-status').textContent = `✅ +${raw} agregado (${conf.toFixed(0)}%)`;

            cooldownActive = true;
            await sleep(1800);
            cooldownActive = false;
            lastScannedNum = null; 
          }
        } else {
          $('cam-status').textContent = `Mismo número detectado, espera…`;
          await sleep(500);
        }
      } else {
        if (raw) {
          $('cam-status').textContent = `Confianza baja (${conf.toFixed(0)}%), reintentando…`;
        } else {
          $('cam-status').textContent = 'Buscando número…';
        }
        await sleep(600);
      }
    } catch(e) {
      await sleep(800);
    }
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

$('mode-manual').addEventListener('click', () => { if (scannerMode) setScannerMode(false); });
$('mode-scanner').addEventListener('click', () => { if (!scannerMode && camStream) setScannerMode(true); });

$('btn-open-cam').addEventListener('click', openCam);
$('cam-btn-close').addEventListener('click', closeCam);

camModal.addEventListener('click', e => { if (e.target === camModal) closeCam(); });

$('btn-pdf-todo').addEventListener('click', () => {
  const desde = $('hist-desde').value;
  const hasta = $('hist-hasta').value;
  let listas = savedLists;
  if (desde || hasta) {
    listas = savedLists.filter(l => {
      if (desde && l.fecha < desde) return false;
      if (hasta && l.fecha > hasta) return false;
      return true;
    });
  }
  if (!listas.length) { alert('No hay listas para exportar.'); return; }
  exportPDF(listas);
});

// ══════════════════════════════════════════
//  EXPORTAR PDF (LISTA VERTICAL ESTRICTA — NOMBRE: CONTEO)
// ══════════════════════════════════════════
function exportPDF(listas) {
  const PW = 794, PH = 1123; // Medidas A4 estándar a 96dpi
  const ML = 45, MR = 45;
  const CW = PW - ML - MR;
  const PAGE_BOTTOM = PH - 50; 

  const sorted = [...listas].sort((a,b) => b.id - a.id);

  function getListaBlockHeight(lista) {
    return 32 + 22 + (lista.numeros.length * 24) + 15; 
  }

  const pages = [[]];
  let currentY = 160; 

  sorted.forEach(lista => {
    const blockH = getListaBlockHeight(lista);
    
    if (currentY + blockH > PAGE_BOTTOM && pages[pages.length - 1].length > 0) {
      pages.push([]);
      currentY = 60; 
    }
    pages[pages.length - 1].push(lista);
    currentY += blockH;
  });

  const totalPages = pages.length;
  const canvases = [];

  pages.forEach((pageListas, pageIdx) => {
    const cv = document.createElement('canvas');
    cv.width  = PW;
    cv.height = PH;
    const cx = cv.getContext('2d');
    canvases.push(cv);

    cx.fillStyle = '#ffffff';
    cx.fillRect(0, 0, PW, PH);

    let y = 0;

    // ── RENDERIZAR ENCABEZADOS DE HOJA ──
    if (pageIdx === 0) {
      // Banner Principal Azul
      cx.fillStyle = '#1e3a8a';
      cx.fillRect(0, 0, PW, 90);

      cx.fillStyle = '#ffffff';
      cx.font = 'bold 34px Arial';
      cx.fillText('Conteo', ML, 52);

      cx.fillStyle = '#93c5fd';
      cx.font = '15px Arial';
      cx.fillText('Reporte de Historial (Lista Vertical)', ML, 74);

      const now = new Date();
      const fechaGen = now.toLocaleDateString('es', { day:'2-digit', month:'long', year:'numeric' });
      cx.fillStyle = '#bfdbfe';
      cx.font = '13px Arial';
      cx.textAlign = 'right';
      cx.fillText('Generado: ' + fechaGen, PW - MR, 74);
      cx.textAlign = 'left';

      // Cajas de Totales Globales
      const totalGlobal = sorted.reduce((a,l) => a + l.numeros.reduce((x,n)=>x+n,0), 0);
      const cantGlobal  = sorted.reduce((a,l) => a + l.numeros.length, 0);

      // Card Izquierda (Total Acumulado)
      cx.fillStyle = '#1e40af';
      roundRect(cx, ML, 102, CW/2 - 8, 44, 6);
      cx.fillStyle = '#93c5fd';
      cx.font = '10px Arial';
      cx.fillText('TOTAL ACUMULADO', ML + 12, 118);
      cx.fillStyle = '#ffffff';
      cx.font = 'bold 20px Arial';
      cx.fillText(totalGlobal.toLocaleString('es'), ML + 12, 138);

      // Card Derecha (Cantidad de Ítems)
      cx.fillStyle = '#1e40af';
      roundRect(cx, ML + CW/2 + 8, 102, CW/2 - 8, 44, 6);
      cx.fillStyle = '#93c5fd';
      cx.font = '10px Arial';
      cx.fillText('CANTIDAD DE NÚMEROS', ML + CW/2 + 20, 118);
      cx.fillStyle = '#ffffff';
      cx.font = 'bold 20px Arial';
      cx.fillText(cantGlobal.toLocaleString('es'), ML + CW/2 + 20, 138);

      y = 165;
    } else {
      // Mini Cabecera para páginas de continuación
      cx.fillStyle = '#1e3a8a';
      cx.fillRect(0, 0, PW, 40);
      cx.fillStyle = '#ffffff';
      cx.font = 'bold 14px Arial';
      cx.fillText('Conteo – Continuación de Lista', ML, 25);
      y = 60;
    }

    // ── RENDERIZAR FILAS EN VERTICAL ESTRICTO ──
    pageListas.forEach((lista) => {
      const total = lista.numeros.reduce((a,b)=>a+b,0);

      // Cabecera Azul de la Lista
      cx.fillStyle = '#2563eb';
      roundRect(cx, ML, y, CW, 32, 5);
      cx.fillStyle = '#ffffff';
      cx.font = 'bold 14px Arial';
      cx.fillText(lista.nombre, ML + 12, y + 21);
      cx.fillStyle = '#bfdbfe';
      cx.font = '12px Arial';
      cx.textAlign = 'right';
      cx.fillText(formatDate(lista.fecha), PW - MR - 12, y + 21);
      cx.textAlign = 'left';
      y += 32;

      // Subcabecera informativa
      cx.fillStyle = '#f8fafc';
      cx.fillRect(ML, y, CW, 22);
      cx.fillStyle = '#475569';
      cx.font = '12px Arial';
      cx.fillText(`Suma total de la lista: ${total.toLocaleString('es')}   ·   Cantidad: ${lista.numeros.length}`, ML + 12, y + 15);
      
      cx.strokeStyle = '#cbd5e1';
      cx.lineWidth = 1;
      cx.beginPath(); cx.moveTo(ML, y + 22); cx.lineTo(ML + CW, y + 22); cx.stroke();
      y += 22;

      // Renderizar números en lista secuencial uno debajo de otro
      for (let i = 0; i < lista.numeros.length; i++) {
        const ny = y + (i * 24);
        
        cx.fillStyle = i % 2 === 0 ? '#f1f5f9' : '#ffffff';
        cx.fillRect(ML, ny, CW, 24);
        
        cx.strokeStyle = '#e2e8f0';
        cx.lineWidth = 0.5;
        cx.strokeRect(ML, ny, CW, 24);

        cx.fillStyle = '#64748b';
        cx.font = 'bold 12px Arial';
        cx.fillText(`#${i + 1}`, ML + 16, ny + 16);

        cx.fillStyle = '#0f172a';
        cx.font = 'bold 14px Arial';
        cx.textAlign = 'right';
        cx.fillText(lista.numeros[i].toLocaleString('es'), ML + CW - 16, ny + 16);
        cx.textAlign = 'left';
      }
      y += (lista.numeros.length * 24) + 15; 
    });

    // ── PIE DE HOJA FIJO ──
    cx.fillStyle = '#1e3a8a';
    cx.fillRect(0, PH - 32, PW, 32);
    cx.fillStyle = '#ffffff';
    cx.font = '11px Arial';
    cx.fillText('Conteo App — Lista Vertical Oficial', ML, PH - 12);
    cx.textAlign = 'right';
    cx.fillText(`Página ${pageIdx + 1} de ${totalPages}`, PW - MR, PH - 12);
    cx.textAlign = 'left';
  });

  const win = window.open('', '_blank');
  if (!win) { alert('Activa las ventanas emergentes en tu navegador.'); return; }

  const imgs = canvases.map(cv => cv.toDataURL('image/jpeg', 0.95));
  const fecha = new Date().toISOString().slice(0,10);

  win.document.write(`<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Conteo_${fecha}</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#fafafa; display: flex; flex-direction: column; align-items: center; }
    .page { display:block; width:100%; max-width: 794px; background: #fff; page-break-after:always; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px; }
    .page:last-child { page-break-after:avoid; margin-bottom: 0; }
    img { width:100%; display:block; }
    @media print {
      body { background: transparent; }
      .page { box-shadow: none; margin-bottom: 0; }
      @page { size:A4; margin:0; }
    }
  </style>
</head>
<body>
${imgs.map(src => `<div class=\"page\"><img src=\"${src}\"></div>`).join('\n')}
<script>
  window.onload = function() {
    setTimeout(function(){ window.print(); }, 350);
  };
<\/script>
</body></html>`);
  win.document.close();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  $('btn-install').style.display = 'block';
});
$('btn-install').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  $('btn-install').style.display = 'none';
});
</script>
